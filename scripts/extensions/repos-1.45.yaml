# repos-1.45.yaml — Extension and skin repositories for MediaWiki 1.45
#
# Each entry specifies:
#   path    — install path relative to the MediaWiki version root
#   url     — git remote URL
#   branch  — branch to check out; use the special token _version_ to
#              auto-expand to REL1_45 for MediaWiki 1.45
#
# The _version_ token expands to REL<MAJOR>_<MINOR> based on the version
# key in this filename (e.g. repos-1.46.yaml → REL1_46).

_version_: REL1_45

